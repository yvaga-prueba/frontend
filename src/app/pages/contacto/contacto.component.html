<div class="contacto-page">
    
    <div class="contacto-header">
        <p class="coordenadas">ATENCIÓN AL CLIENTE</p>
        <h1 class="contacto-title">CONTACTO</h1>
    </div>

    <div class="contacto-container">
        
        <div class="contacto-info">
            <h2>ESTAMOS ACÁ.</h2>
            <p class="info-desc">
                Cualquier duda con tu pedido, con el calce de alguna prenda o si simplemente querés saber más sobre la marca, escribinos. 
            </p>
            
            <div class="info-block">
                <h4>NUESTRA BASE</h4>
                <p>Corrientes, Argentina.<br>Hacemos envíos a todo el país.</p>
            </div>

            <div class="info-block">
                <h4>CONTACTO DIRECTO</h4>
                <p><i class="bi bi-instagram"></i> <a href="https://instagram.com/yvaga" target="_blank">yvaga</a></p>
                <p><i class="bi bi-whatsapp"></i> <a href="https://wa.me/5493790000000" target="_blank">+54 9 379 400-0000</a></p>
                <p><i class="bi bi-envelope"></i> hola&#64;yvaga.com.ar</p>
            </div>
        </div>

        <div class="contacto-form-wrapper">
            <form class="yvaga-form" (submit)="$event.preventDefault()">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" placeholder="Tu nombre">
                    </div>
                    <div class="form-group">
                        <label>Nº de Orden (Opcional)</label>
                        <input type="text" placeholder="#YVG-">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="tu@email.com">
                </div>

                <div class="form-group">
                    <label>Mensaje</label>
                    <textarea rows="5" placeholder="¿En qué te podemos ayudar?"></textarea>
                </div>

                <button type="submit" class="btn-primary-yvaga">ENVIAR MENSAJE</button>
            </form>
        </div>

    </div>
</div>

<div class="hero-con-video">
  <video class="video-bg" autoplay muted loop playsinline [muted]="true">
    <source src="assets/videofondo.mp4" type="video/mp4" />
  </video>

  <div class="overlay-video"></div>

  <div class="hero-content">
    <h1>NUEVA COLECCIÓN 2026</h1>
    <p>Descubrí la nueva tendencia en moda urbana.</p>
    <a routerLink="/products" class="btn-ghost-premium">VER TIENDA</a>
  </div>



</div> <div class="section-separator">
  <h2>EXPLORÁ POR CATEGORÍA</h2>
  <div class="linea-decorativa"></div>
</div>



<section class="stories-section">
  <div class="stories-container">
    
    <div 
      class="story-item" 
      *ngFor="let story of stories"
      [routerLink]="story.link"
      [queryParams]="story.queryParams" 
    >
      <div class="story-ring">
        <img [src]="story.img" [alt]="story.name" class="story-img">
      </div>
      <span class="story-name">{{ story.name }}</span>
    </div>

  </div>
</section>

<div class="section-separator">

<section class="categories-container">
  

  <div
    class="category-card"
    routerLink="/products"
    [queryParams]="{ category: 'buzos' }"
  >
    <div class="image-wrapper">
      <img
        src="assets/buzos2.png"
        alt="Buzos"
        class="cat-img"
      />
    </div>
    <div class="category-overlay">
      <h3>BUZOS</h3>
      <span class="btn-shop">VER MÁS</span>
    </div>
  </div>

  <div
    class="category-card"
    routerLink="/products"
    [queryParams]="{ category: 'pantalones' }"
  >
    <div class="image-wrapper">
      <img
       src="assets/pantalones2.png"
        alt="Pantalones"
        class="cat-img"
      />
    </div>
    <div class="category-overlay">
      <h3>PANTALONES</h3>
      <span class="btn-shop">VER MÁS</span>
    </div>
  </div>
</section>

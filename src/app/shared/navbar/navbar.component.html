<header class="header-container" [class.scrolled]="isScrolled" [class.light-bg]="forceDark()">

  <div class="top-bar">
    <div class="ticker-wrapper">
      <div class="ticker-text">
        {{ tickerText }}
      </div>
    </div>
  </div>

  <div class="nav-wrapper">
    <div class="header-content">

      <div class="header-left">
        <button class="mobile-menu-btn" (click)="toggleMenu()">
          <i class="bi bi-list"></i>
        </button>
        <div class="search-icon-container">
          <i class="bi bi-search icon" (click)="toggleMobileSearch()" style="cursor: pointer;"></i>

          <input type="text" class="search-input desktop-only" placeholder="¿Qué estás buscando?"
            (input)="onGlobalSearch($event)"
            style="border: none; background: transparent; outline: none; margin-left: 8px;">
        </div>
      </div>
      
      <div class="header-center" [style.opacity]="(isNuestraHistoria() && !isScrolled) ? '0' : '1'">
        <a routerLink="/" class="logo-link">
          <span class="brand-text">YVAGA</span>
        </a>
      </div>

      <div class="header-right">
        <div class="user-widget desktop-only" *ngIf="isLoggedIn()">
          <a routerLink="/admin" class="admin-link" *ngIf="isAdmin()" title="Panel admin">
            <i class="bi bi-shield-lock-fill"></i>
            <span>Admin</span>
          </a>
          <button class="user-email-btn" (click)="goToPerfil()" title="Ver perfil">
            <i class="bi bi-person-check icon"></i>
            <span class="user-email-text">{{ currentUser()?.email }}</span>
          </button>
          <span class="user-sep">|</span>
          <button class="user-logout-btn" (click)="logout()" title="Cerrar sesión">
            <i class="bi bi-box-arrow-right"></i>
          </button>
        </div>

        <a routerLink="/auth/login" class="action-item desktop-only" *ngIf="!isLoggedIn()" title="Iniciar sesión">
          <i class="bi bi-person-circle icon"></i>
        </a>

        <a class="action-item" routerLink="/favoritos" title="Mis Favoritos">
          <i class="bi bi-heart icon"></i>
          <span class="cart-badge fav-badge" *ngIf="favCount() > 0">{{ favCount() }}</span>
        </a>

        <a class="action-item" routerLink="/cart" title="Ver carrito">
          <i class="bi bi-cart3 icon"></i>
          <span class="cart-badge" *ngIf="cartCount() > 0">{{ cartCount() }}</span>
        </a>
      </div>
    </div>

    <div class="mobile-search-bar" [class.active]="isMobileSearchOpen">
      <i class="bi bi-search search-icon-inside"></i>
      <input type="text" placeholder="Buscar productos..." (input)="onGlobalSearch($event)">
      <i class="bi bi-x-lg close-search" (click)="toggleMobileSearch()"></i>
    </div>

    <nav class="desktop-nav">
      <ul class="nav-list">
        <li><a routerLink="/products">PRODUCTOS</a></li>
        <li><a routerLink="/nuestra-historia">NUESTRA HISTORIA</a></li>
        <li><a routerLink="/contacto">CONTACTO</a></li>
      </ul>
    </nav>

  </div>

  <div class="mobile-menu-overlay" [class.open]="isMenuOpen">
    
    <div class="mobile-menu-header">
      <span class="brand-text-mobile">YVAGA</span>
      <button class="close-menu-btn" (click)="toggleMenu()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <nav class="mobile-nav-main">
      <ul>
        <li><a routerLink="/products" (click)="toggleMenu()">PRODUCTOS</a></li>
        <li><a routerLink="/nuestra-historia" (click)="toggleMenu()">HISTORIA</a></li>
        <li><a routerLink="/contacto" (click)="toggleMenu()">CONTACTO</a></li>
      </ul>
    </nav>

    <div class="mobile-nav-footer">
      <ul>
        <li *ngIf="!isLoggedIn()"><a routerLink="/auth/login" (click)="toggleMenu()">Mi Cuenta</a></li>
        <li *ngIf="isLoggedIn()"><a routerLink="/perfil" (click)="toggleMenu()">Mi Perfil</a></li>
        <li *ngIf="isAdmin()"><a routerLink="/admin" (click)="toggleMenu()">Panel Admin</a></li>
        <li *ngIf="isLoggedIn()"><a (click)="logout(); toggleMenu()" style="cursor:pointer">Cerrar Sesión</a></li>
      </ul>
    </div>

  </div>
</header>

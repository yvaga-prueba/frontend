<nav class="navbar">
  <div class="navbar__left">
    <img
      src="assets/logo-yvaga.jpeg"
      alt="Logo"
      class="navbar__logo"
      (click)="goToSection('home')"
    />
  </div>

  <div class="navbar__center" (click)="goToSection('home')">
    <span class="navbar__title">YVAGA</span>
  </div>

  <div class="navbar__right">
    <button class="navbar__toggle" (click)="isMenuOpen = !isMenuOpen">☰</button>

    <ul class="navbar__links" [class.open]="isMenuOpen">
      <li>
        <a class="navbar__link" (click)="goToSection('encontranos')"
          >Encontranos</a
        >
      </li>
      <li>
        <a class="navbar__link" (click)="goToSection('contacto')">Contacto</a>
      </li>
      <li>
        <a
          class="navbar__link"
          routerLink="/auth/login"
          (click)="isMenuOpen = false"
          >Login</a
        >
      </li>
      <li>
        <a
          class="navbar__link"
          routerLink="/auth/register"
          (click)="isMenuOpen = false"
          >Register</a
        >
      </li>
    </ul>
  </div>
</nav>

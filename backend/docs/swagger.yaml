basePath: /
definitions:
  dto.CreateProductRequest:
    properties:
      bar_code:
        example: 7501234567890
        type: integer
      category:
        example: Remeras
        type: string
      description:
        example: Remera de algodón 100% color negro, cuello redondo
        type: string
      size:
        description: S,M,L,XL,XXL
        enum:
        - S
        - M
        - L
        - XL
        - XXL
        example: M
        type: string
      stock:
        example: 50
        minimum: 0
        type: integer
      title:
        example: Remera Básica Negra
        type: string
      unit_price:
        example: 2500
        minimum: 0
        type: number
    required:
    - bar_code
    - category
    - description
    - size
    - stock
    - title
    - unit_price
    type: object
  dto.CreateTicketRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.TicketItemRequest'
        type: array
      notes:
        example: Customer notes
        type: string
      payment_method:
        allOf:
        - $ref: '#/definitions/model.PaymentMethod'
        example: cash
    type: object
  dto.ErrorGeneral:
    properties:
      message:
        example: Error message
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: secret123
        type: string
    type: object
  dto.LoginResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR...
        type: string
      expires_in:
        example: 3600
        type: integer
      token_type:
        example: Bearer
        type: string
    type: object
  dto.ProductImageResponse:
    properties:
      created_at:
        example: "2025-01-15T10:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      is_primary:
        example: true
        type: boolean
      position:
        example: 0
        type: integer
      product_id:
        example: 1
        type: integer
      url:
        example: /static/products/1/image.jpg
        type: string
    type: object
  dto.ProductResponse:
    properties:
      bar_code:
        example: 7501234567890
        type: integer
      category:
        example: Remeras
        type: string
      description:
        example: Remera de algodón 100% color negro, cuello redondo
        type: string
      id:
        example: 1
        type: integer
      size:
        example: M
        type: string
      stock:
        example: 50
        type: integer
      title:
        example: Remera Básica Negra
        type: string
      unit_price:
        example: 2500
        type: number
    type: object
  dto.RegisterRequest:
    properties:
      email:
        example: john.doe@example.com
        type: string
      first_name:
        example: John
        type: string
      last_name:
        example: Doe
        type: string
      password:
        example: secret123
        type: string
    type: object
  dto.RegisterResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR...
        type: string
      expires_in:
        example: 3600
        type: integer
      token_type:
        example: Bearer
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.TicketItemRequest:
    properties:
      product_id:
        example: 1
        type: integer
      quantity:
        example: 2
        type: integer
    type: object
  dto.TicketLineResponse:
    properties:
      created_at:
        type: string
      id:
        example: 1
        type: integer
      product_id:
        example: 1
        type: integer
      product_size:
        example: M
        type: string
      product_title:
        example: Product Name
        type: string
      quantity:
        example: 2
        type: integer
      subtotal:
        example: 199.98
        type: number
      unit_price:
        example: 99.99
        type: number
    type: object
  dto.TicketReceiptResponse:
    properties:
      cae:
        type: string
      cae_due_date:
        type: string
      created_at:
        type: string
      invoice_number:
        type: string
      invoice_type:
        type: string
      lines:
        items:
          $ref: '#/definitions/dto.TicketLineResponse'
        type: array
      notes:
        type: string
      paid_at:
        type: string
      payment_method:
        allOf:
        - $ref: '#/definitions/model.PaymentMethod'
        example: cash
      status:
        allOf:
        - $ref: '#/definitions/model.TicketStatus'
        example: paid
      subtotal:
        example: 199.98
        type: number
      tax_amount:
        example: 41.99
        type: number
      tax_rate:
        example: 21
        type: number
      ticket_number:
        example: TKT-2024-000001
        type: string
      total:
        example: 241.97
        type: number
      user_email:
        example: john@example.com
        type: string
      user_name:
        example: John Doe
        type: string
    type: object
  dto.TicketResponse:
    properties:
      cae:
        type: string
      cae_due_date:
        type: string
      cancelled_at:
        type: string
      completed_at:
        type: string
      created_at:
        type: string
      id:
        example: 1
        type: integer
      invoice_number:
        type: string
      invoice_type:
        type: string
      lines:
        items:
          $ref: '#/definitions/dto.TicketLineResponse'
        type: array
      notes:
        type: string
      paid_at:
        type: string
      payment_method:
        allOf:
        - $ref: '#/definitions/model.PaymentMethod'
        example: cash
      status:
        allOf:
        - $ref: '#/definitions/model.TicketStatus'
        example: paid
      subtotal:
        example: 199.98
        type: number
      tax_amount:
        example: 41.99
        type: number
      tax_rate:
        example: 21
        type: number
      ticket_number:
        example: TKT-2024-000001
        type: string
      total:
        example: 241.97
        type: number
      updated_at:
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  dto.TicketSummaryResponse:
    properties:
      cae:
        type: string
      cae_due_date:
        type: string
      created_at:
        type: string
      id:
        example: 1
        type: integer
      invoice_number:
        type: string
      invoice_type:
        type: string
      item_count:
        example: 3
        type: integer
      payment_method:
        allOf:
        - $ref: '#/definitions/model.PaymentMethod'
        example: cash
      status:
        allOf:
        - $ref: '#/definitions/model.TicketStatus'
        example: paid
      ticket_number:
        example: TKT-2024-000001
        type: string
      total:
        example: 241.97
        type: number
    type: object
  dto.UpdateProductRequest:
    properties:
      bar_code:
        example: 7501234567890
        type: integer
      category:
        example: Remeras
        type: string
      description:
        example: Remera de algodón 100% color negro, cuello redondo
        type: string
      size:
        description: S,M,L,XL,XXL
        example: M
        type: string
      stock:
        example: 50
        type: integer
      title:
        example: Remera Básica Negra
        type: string
      unit_price:
        example: 2500
        type: number
    type: object
  dto.UserResponse:
    properties:
      email:
        example: juan@example.com
        type: string
      first_name:
        example: Juan
        type: string
      id:
        example: 1
        type: integer
      last_name:
        example: Pérez
        type: string
      provider:
        example: local
        type: string
      role:
        example: user
        type: string
    type: object
  handle.CreatePreferenceRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.TicketItemRequest'
        type: array
      notes:
        type: string
      payment_method:
        description: '"card" | "transfer" | "cash"'
        type: string
    type: object
  handle.CreatePreferenceResponse:
    properties:
      account_name:
        type: string
      alias:
        type: string
      amount:
        type: number
      bank_name:
        type: string
      cbu:
        description: 'Para "transfer": datos bancarios'
        type: string
      redirect_url:
        description: 'Para "card": URL de redirección a MercadoPago'
        type: string
      ticket_id:
        type: integer
      ticket_number:
        description: Número de ticket creado (para transfer/cash inmediato)
        type: string
    type: object
  model.PaymentMethod:
    enum:
    - cash
    - credit_card
    - debit_card
    - digital_wallet
    type: string
    x-enum-varnames:
    - PaymentMethodCash
    - PaymentMethodCreditCard
    - PaymentMethodDebitCard
    - PaymentMethodDigitalWallet
  model.TicketStatus:
    enum:
    - pending
    - paid
    - completed
    - cancelled
    type: string
    x-enum-varnames:
    - TicketStatusPending
    - TicketStatusPaid
    - TicketStatusCompleted
    - TicketStatusCancelled
host: localhost:8080
info:
  contact: {}
  description: API for managing products with authentication
  title: Core API
  version: "1.0"
paths:
  /api/auth/google/login:
    get:
      description: Redirecciona al usuario a la página de login de Google.
      produces:
      - application/json
      responses:
        "302":
          description: Redirección a Google
      summary: Login con Google (redirect)
      tags:
      - auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Autenticación local. Devuelve JWT y datos básicos del usuario.
      parameters:
      - description: Credenciales de acceso
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
      summary: Login (email y password)
      tags:
      - auth
  /api/auth/me:
    get:
      description: Devuelve la información del usuario actual basada en el JWT.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserResponse'
      security:
      - BearerAuth: []
      summary: Obtener usuario autenticado
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Registra un nuevo usuario con email y contraseña y devuelve JWT
        + datos del usuario.
      parameters:
      - description: Datos de registro
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.RegisterResponse'
      summary: Registrar usuario local
      tags:
      - auth
  /api/payments/preference:
    post:
      consumes:
      - application/json
      description: 'Para tarjeta: crea preference en MP y devuelve redirect URL.'
      parameters:
      - description: Payment data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handle.CreatePreferenceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handle.CreatePreferenceResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Crear preferencia de pago
      tags:
      - payments
  /api/payments/webhook:
    post:
      consumes:
      - application/json
      description: Recibe notificaciones de pago de MP y actualiza el estado del ticket
        a 'paid'
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Webhook de MercadoPago
      tags:
      - payments
  /api/products:
    get:
      description: Filtra por categoría, talla, query, limit y offset
      parameters:
      - description: Categoría
        in: query
        name: category
        type: string
      - description: Talla (S,M,L,XL,XXL)
        in: query
        name: size
        type: string
      - description: Búsqueda en título/desc
        in: query
        name: q
        type: string
      - description: Límite (<=100)
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Listar productos
      tags:
      - products
    post:
      consumes:
      - application/json
      description: Crea un nuevo producto (solo admin)
      parameters:
      - description: Product data
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/dto.CreateProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ProductResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorGeneral'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorGeneral'
      security:
      - BearerAuth: []
      summary: Crear producto
      tags:
      - products
  /api/products/{id}:
    delete:
      description: Elimina un producto por ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorGeneral'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorGeneral'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorGeneral'
      security:
      - BearerAuth: []
      summary: Eliminar producto
      tags:
      - products
    get:
      description: Obtiene un producto específico por su ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProductResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Obtener producto por ID
      tags:
      - products
    put:
      consumes:
      - application/json
      description: Actualiza un producto existente por ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      - description: Product data
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProductResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Actualizar producto
      tags:
      - products
  /api/products/{id}/add-stock:
    post:
      consumes:
      - application/json
      description: Incrementa el stock de un producto existente (solo admin)
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      - description: quantity to add
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProductResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Agregar stock a un producto
      tags:
      - products
  /api/products/{id}/images:
    get:
      description: Get all images associated with a product
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ProductImageResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all images for a product
      tags:
      - product_image
    post:
      consumes:
      - multipart/form-data
      description: Upload an image file for a specific product
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      - description: Image file
        in: formData
        name: file
        required: true
        type: file
      - description: Is primary image
        in: formData
        name: is_primary
        type: boolean
      - description: Image position
        in: formData
        name: position
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ProductImageResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upload an image for a product
      tags:
      - product_image
  /api/products/{id}/images/{imageId}:
    delete:
      description: Delete a specific product image by ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      - description: Image ID
        in: path
        name: imageId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a product image
      tags:
      - product_image
  /api/products/combined:
    post:
      consumes:
      - multipart/form-data
      description: Crea el producto y asigna el orden de las imágenes según el orden
        de subida.
      parameters:
      - description: Código de barras
        format: int64
        in: formData
        name: bar_code
        required: true
        type: integer
      - description: Título
        in: formData
        name: title
        required: true
        type: string
      - description: Descripción
        in: formData
        name: description
        required: true
        type: string
      - description: Stock
        format: int64
        in: formData
        name: stock
        required: true
        type: integer
      - description: Talla (S,M,L,XL,XXL)
        in: formData
        name: size
        required: true
        type: string
      - description: Categoría
        in: formData
        name: category
        required: true
        type: string
      - description: Precio unitario
        in: formData
        name: unit_price
        required: true
        type: number
      - collectionFormat: csv
        description: Imágenes (enviar múltiples archivos con la misma clave 'files')
        in: formData
        items:
          type: file
        name: files
        type: array
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Crear producto + imágenes (fachada)
      tags:
      - product_with_images
  /api/tickets:
    get:
      description: Retrieves all tickets with filtering options
      parameters:
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by user ID
        in: query
        name: user_id
        type: integer
      - description: Filter from date (YYYY-MM-DD)
        in: query
        name: date_from
        type: string
      - description: Filter to date (YYYY-MM-DD)
        in: query
        name: date_to
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.TicketSummaryResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List all tickets (admin only)
      tags:
      - tickets
    post:
      consumes:
      - application/json
      description: Creates a new ticket with payment and reduces stock immediately
      parameters:
      - description: Ticket data
        in: body
        name: ticket
        required: true
        schema:
          $ref: '#/definitions/dto.CreateTicketRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.TicketResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorGeneral'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorGeneral'
      security:
      - BearerAuth: []
      summary: Create a new ticket (sale)
      tags:
      - tickets
  /api/tickets/{id}:
    get:
      description: Retrieves a ticket with all its line items (owner or admin only)
      parameters:
      - description: Ticket ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TicketResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorGeneral'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorGeneral'
      security:
      - BearerAuth: []
      summary: Get ticket by ID
      tags:
      - tickets
  /api/tickets/{id}/cancel:
    post:
      description: Cancels a ticket and restores product stock
      parameters:
      - description: Ticket ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TicketResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorGeneral'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorGeneral'
      security:
      - BearerAuth: []
      summary: Cancel a ticket
      tags:
      - tickets
  /api/tickets/{id}/complete:
    post:
      description: Changes ticket status from paid to completed
      parameters:
      - description: Ticket ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK

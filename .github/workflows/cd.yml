name: cd

on:
  push:
    branches: 
      - master

env:
  REGISTRY: docker.io
  IMAGE: frontend
  HEALTHCHECK: \/
  CONTAINERPORT: 80
  HOST: www.yvaga.com.ar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: "Docker Hub repository login 💠"
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DKR_USR }}
          password: ${{ secrets.DKR_PSW }}
      
      - name: "Build image and publish it 🐳"
        shell: bash
        run: |
          # Building image with binaries
          docker build . -f Containerfile -t ${{ env.REGISTRY }}/${{ secrets.DKR_USR }}/${{ env.IMAGE }}:latest
          # Pushing image to repository
          docker push ${{ env.REGISTRY }}/${{ secrets.DKR_USR }}/${{ env.IMAGE }}:latest
